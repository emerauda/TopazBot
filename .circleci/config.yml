version: 2.1
# Node versions are kept in sync with "engines" in package.json (>=22).
# cimg/node images ship a modern compiler toolchain, which is required to
# build @discordjs/opus from source when no prebuilt binary matches the ABI
# (cimg/base is Ubuntu 20.04 whose g++ does not understand -std=gnu++20).
jobs:
  build-v22:
    docker:
      - image: cimg/node:22.23
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build
          command: npm run build
  build-v24:
    docker:
      - image: cimg/node:24.18
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build
          command: npm run build

workflows:
  build:
    jobs:
      - build-v22
      - build-v24
