version: 2.1
orbs:
  node: circleci/node@5.2
# Node versions are kept in sync with "engines" in package.json (>=22)
jobs:
  test-v22:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - node/install:
          node-version: "22.23"
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests
          command: npm test
          environment:
            NODE_ENV: test
            CI: true
            TEST_ENV: true
      - run:
          name: Run ESLint
          command: npm run lint
      - run:
          name: Run Prettier
          command: npm run format:check
      - run:
          name: Verify build
          command: echo "Build and tests completed successfully!"
  
  test-v24:
    docker:
      - image: cimg/node:24.18
    steps:
      - checkout
      - node/install:
          node-version: "24.18"
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests
          command: npm test
          environment:
            NODE_ENV: test
            CI: true
            TEST_ENV: true
      - run:
          name: Run ESLint
          command: npm run lint
      - run:
          name: Run Prettier
          command: npm run format:check
      - run:
          name: Verify build
          command: echo "Build and tests completed successfully!"

workflows:
  build_and_test:
    jobs:
      - test-v22
      - test-v24