version: 2.1
orbs:
  node: circleci/node@5.2
# Node versions are kept in sync with "engines" in package.json (>=22)
jobs:
  build-v22:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - node/install:
          node-version: "22.17"
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build
          command: npm run build
  build-v24:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - node/install:
          node-version: "24.12"
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build
          command: npm run build

workflows:
  build:
    jobs:
      - build-v22
      - build-v24
